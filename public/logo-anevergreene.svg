<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Earth globe -->
    <radialGradient id="earthGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e28" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#142420" stop-opacity="0.95"/>
      <stop offset="85%" stop-color="#0e1525"/>
      <stop offset="100%" stop-color="#0e1525"/>
    </radialGradient>

    <!-- Atmosphere rim -->
    <radialGradient id="atmosphere" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="92%" stop-color="#4a7d5a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6a9e78" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Heart gem -->
    <radialGradient id="gemGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0a870" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#e8945a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c47a3a" stop-opacity="0"/>
    </radialGradient>

    <!-- Copper ring -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8845a" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#7a4730" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8845a" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background -->
